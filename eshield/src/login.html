<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 · eShield</title>
  <style>
    :root {
      --text: #111;
      --muted: #666;
      --border: #e5e5e5;
      --border-strong: #d4d4d4;
      --bg: #fafafa;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text: #eee;
        --muted: #999;
        --border: #333;
        --border-strong: #444;
        --bg: #111;
        --primary: #3b82f6;
        --primary-hover: #60a5fa;
        --danger: #f87171;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .box {
      width: 100%;
      max-width: 360px;
      padding: 40px 24px;
    }
    h1 { font-size: 20px; font-weight: 600; margin: 0 0 6px; }
    p { margin: 0 0 24px; color: var(--muted); font-size: 14px; line-height: 1.5; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--muted); }
    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      outline: none;
    }
    input:focus { border-color: var(--primary); }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: var(--primary-hover); }
    .error {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--danger);
      border: 1px solid var(--danger);
      border-radius: 8px;
    }
    .hint {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>eShield 控制台</h1>
    <p>请输入访问令牌以继续。</p>
    <form id="login-form">
      <label for="token">访问令牌</label>
      <input type="password" id="token" name="token" placeholder="Bearer Token" autocomplete="off" autofocus required>
      <button type="submit">登录</button>
    </form>
    <div class="error" id="error">令牌无效，请检查后重试。</div>
    <div class="hint">默认令牌可在服务启动日志中查看，或通过 <code>api_token</code> 配置项指定。</div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const token = document.getElementById('token').value.trim();
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        if (res.ok) {
          localStorage.setItem('eshield-token', token);
          window.location.href = '/';
        } else {
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = '无法连接到服务，请确认 eShield 已启动。';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
