<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>安全验证 · eShield</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --border: #e8eaed;
      --text: #1f2329;
      --text-secondary: #5c6670;
      --text-tertiary: #8a949e;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-soft: #eff6ff;
      --success: #10b981;
      --radius: 14px;
      --shadow: 0 8px 30px rgba(31, 35, 41, 0.08);
      --transition: all .25s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-secondary: #9fa8b3;
      --text-tertiary: #6e7681;
      --primary: #3b82f6;
      --primary-hover: #60a5fa;
      --primary-soft: #1f2937;
      --success: #34d399;
      --shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    html { font-size: 14px; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      padding: 40px;
      text-align: center;
      animation: slideUp .4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 20px;
      color: var(--text);
      margin-bottom: 28px;
    }
    .brand svg { width: 30px; height: 30px; }
    .shield {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      color: var(--primary);
      background: var(--primary-soft);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shield svg { width: 36px; height: 36px; }
    h1 { font-size: 20px; font-weight: 600; margin: 0 0 10px; }
    .desc { color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin: 0 0 28px; }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      border-radius: 10px;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 500;
      margin-bottom: 20px;
      min-height: 52px;
    }
    .status.success { background: color-mix(in srgb, var(--success) 12%, transparent); color: var(--success); }
    .status.error { background: color-mix(in srgb, #ef4444 12%, transparent); color: #ef4444; }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid currentColor;
      border-bottom-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .detail {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 24px;
    }
    .detail code {
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-tertiary);
    }
    input, button { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
      eShield
    </div>
    <div class="shield">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
    </div>
    <h1>安全验证中</h1>
    <p class="desc">系统正在校验您的访问环境，验证通过后将自动获得临时访问权限。</p>
    <div class="status" id="status">
      <div class="spinner"></div>
      <span>正在验证浏览器环境…</span>
    </div>
    <div class="detail">源 IP：<code id="ip-display">{ip}</code></div>
    <div class="footer">Powered by eShield · 主机级 CC 防御盾</div>
  </div>

  <form id="challenge-form">
    <input type="hidden" id="nonce" value="{nonce}">
    <input type="hidden" id="ip" value="{ip}">
    <input type="hidden" id="answer" value="">
  </form>

  <script>
    const nonceEl = document.getElementById('nonce');
    const answerEl = document.getElementById('answer');
    const [a, b] = nonceEl.value.split(':');
    answerEl.value = (BigInt(a) + BigInt(b)).toString();

    function setStatus(html, type) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.innerHTML = html;
    }

    async function submit(ip) {
      if (!ip || ip === '{ip}') {
        setStatus('<span>无法获取 IP 地址，请刷新重试</span>', 'error');
        return;
      }
      try {
        const res = await fetch('/api/challenge/pass', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ ip, nonce: nonceEl.value, answer: answerEl.value })
        });
        const text = await res.text();
        if (res.ok) {
          setStatus('<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span>验证通过，请返回原页面刷新</span>', 'success');
        } else {
          setStatus('<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span>' + (text || '验证失败') + '</span>', 'error');
        }
      } catch (e) {
        setStatus('<span>网络错误，请稍后重试</span>', 'error');
      }
    }

    const ip = document.getElementById('ip').value;
    submit(ip);
  </script>
</body>
</html>
