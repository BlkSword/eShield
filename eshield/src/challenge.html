<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Security Check · eShield</title>
  <style>
    :root {
      --text: #111;
      --muted: #666;
      --border: #e5e5e5;
      --bg: #fafafa;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text: #eee;
        --muted: #999;
        --border: #333;
        --bg: #111;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .box {
      width: 100%;
      max-width: 360px;
      padding: 40px 24px;
      text-align: center;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; }
    p { margin: 0 0 24px; color: var(--muted); font-size: 14px; line-height: 1.5; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 13px;
      color: var(--muted);
    }
    .status::before {
      content: "";
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-bottom-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .status.success { color: #16a34a; border-color: #16a34a; }
    .status.error { color: #dc2626; border-color: #dc2626; }
    .status.success::before, .status.error::before {
      animation: none;
      border: none;
      width: auto;
      height: auto;
    }
    .status.success::before { content: "✓"; font-size: 14px; }
    .status.error::before { content: "✕"; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .meta { margin-top: 24px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="box">
    <h1>安全验证</h1>
    <p>正在确认您的访问环境，请稍候。</p>
    <div class="status" id="status">验证中…</div>
    <div class="meta">IP: <span id="ip-display">{ip}</span></div>
  </div>

  <form style="display:none">
    <input type="hidden" id="nonce" value="{nonce}">
    <input type="hidden" id="ip" value="{ip}">
    <input type="hidden" id="answer" value="">
  </form>

  <script>
    const nonceEl = document.getElementById('nonce');
    const ipEl = document.getElementById('ip');
    const statusEl = document.getElementById('status');
    const ipDisplay = document.getElementById('ip-display');

    const nonce = nonceEl.value;
    const ip = ipEl.value;
    const [a, b] = nonce.split(':');
    const answer = (BigInt(a) + BigInt(b)).toString();
    if (ip && ip !== '{ip}') ipDisplay.textContent = ip;

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = 'status ' + cls;
    }

    fetch('/api/challenge/pass', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ip, nonce, answer })
    })
    .then(r => r.text().then(t => setStatus(r.ok ? '验证通过，请刷新页面' : (t || '验证失败'), r.ok ? 'success' : 'error')))
    .catch(() => setStatus('网络错误，请稍后重试', 'error'));
  </script>
</body>
</html>
