<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>403 Forbidden · eShield</title>
  <style>
    :root {
      --text: #111;
      --muted: #666;
      --border: #e5e5e5;
      --bg: #fafafa;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text: #eee;
        --muted: #999;
        --border: #333;
        --bg: #111;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .box {
      width: 100%;
      max-width: 360px;
      padding: 40px 24px;
      text-align: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid #dc2626;
      color: #dc2626;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; }
    p { margin: 0 0 20px; color: var(--muted); font-size: 14px; line-height: 1.5; }
    .meta {
      border-top: 1px solid var(--border);
      padding-top: 20px;
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      text-align: left;
    }
    .meta div { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .meta span { font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <div class="box">
    <div class="badge">403 Forbidden</div>
    <h1>访问已被拦截</h1>
    <p>当前请求触发了安全防护规则，已被系统拦截。如果您认为这是一个误拦截，请联系管理员。</p>
    <div class="meta">
      <div>源 IP <span>{ip}</span></div>
      <div>时间 <span>{timestamp}</span></div>
      <div>请求 ID <span>{request_id}</span></div>
    </div>
  </div>
</body>
</html>
