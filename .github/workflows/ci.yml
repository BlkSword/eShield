name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check fmt
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --workspace --exclude eshield-ebpf -- -D warnings

  clippy-ebpf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly + bpf target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: bpfel-unknown-none
          components: rust-src, clippy
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y llvm clang
      - name: Run eBPF clippy
        run: cargo +nightly clippy --package eshield-ebpf --target bpfel-unknown-none -Z build-std=core -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly + bpf target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: bpfel-unknown-none
          components: rust-src
      - name: Install Rust stable + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y llvm clang
      - name: Build eBPF
        run: cargo xtask build-ebpf
      - name: Build userspace
        run: cargo build --package eshield --target x86_64-unknown-linux-musl --release

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Run unit tests
        run: cargo test --workspace --exclude eshield-ebpf

  integration-tests:
    name: integration-tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-latest]
    env:
      CARGO: cargo
      RUSTUP: rustup
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly + bpf target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: bpfel-unknown-none
          components: rust-src
      - name: Install Rust stable + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y llvm clang
      - name: Install test dependencies
        run: sudo apt-get install -y hping3 netcat-traditional
      - name: Print kernel version
        run: uname -r
      - name: Build eBPF
        run: cargo +nightly build --package eshield-ebpf --target bpfel-unknown-none -Z build-std=core --release
      - name: Build userspace
        run: cargo build --package eshield --target x86_64-unknown-linux-musl --release
      - name: Run integration tests
        run: sudo bash tests/netns_test.sh
